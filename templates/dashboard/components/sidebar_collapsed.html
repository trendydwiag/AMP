{% load static %}
<aside class="w-16 h-full bg-white dark:bg-coffee-800 border-r border-coffee-200 dark:border-coffee-700 flex flex-col items-center overflow-y-auto py-3">

  <a href="/" class="w-10 h-10 rounded-xl bg-coffee-600 flex items-center justify-center mb-4" title="Kabulhaden">
    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </a>

  <div class="w-8 border-t border-coffee-200 dark:border-coffee-700 mb-3"></div>

  <nav class="flex flex-col items-center gap-1 w-full">

    {# Beranda #}
    <a href="/"
       title="Beranda"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if request.resolver_match.url_name == 'home' %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>

    {# Website #}
    <a href="{% url 'broadcast:program_list' %}"
       title="Program"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if 'program' in request.resolver_match.url_name %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
    </a>
    <a href="#"
       title="Podcast"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if request.resolver_match.url_name == 'podcast_list' %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </a>
    <a href="#"
       title="Berita"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if request.resolver_match.url_name == 'news_list' %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </a>
    <a href="#"
       title="Komunitas"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if request.resolver_match.url_name == 'community' %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    </a>

    <div class="w-8 border-t border-coffee-200 dark:border-coffee-700 my-2"></div>

    {# Radio #}
    <a href="{% url 'radio:dashboard' %}"
       title="Dashboard Radio"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if request.resolver_match.app_name == 'radio' %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.4"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.4"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>
    </a>

    <div class="w-8 border-t border-coffee-200 dark:border-coffee-700 my-2"></div>

    {# Siaran #}
    <a href="{% url 'broadcast:dashboard' %}"
       title="Dashboard Siaran"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if request.resolver_match.app_name == 'broadcast' %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
    </a>

    <div class="w-8 border-t border-coffee-200 dark:border-coffee-700 my-2"></div>

    {# Media #}
    <a href="{% url 'media_manager:dashboard' %}"
       title="Dashboard Media"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if request.resolver_match.app_name == 'media_manager' %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </a>

    <div class="w-8 border-t border-coffee-200 dark:border-coffee-700 my-2"></div>

    {# Sistem #}
    <a href="{% url 'users:admin_user_list' %}"
       title="Pengguna"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if request.resolver_match.app_name == 'users' %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
    <a href="{% url 'settings:site' %}"
       title="Pengaturan"
       class="w-10 h-10 rounded-xl flex items-center justify-center transition-colors
              {% if request.resolver_match.app_name == 'settings' %}
                bg-coffee-100 dark:bg-coffee-700 text-coffee-600 dark:text-coffee-200 border-l-2 border-coffee-400
              {% else %}
                text-coffee-500 dark:text-coffee-400 hover:bg-coffee-50 dark:hover:bg-coffee-700/50
              {% endif %}">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </a>

  </nav>

  <div class="mt-auto pt-3">
    <a href="{% url 'users:profile' %}" title="Profil" class="w-10 h-10 rounded-full bg-coffee-300 dark:bg-coffee-600 flex items-center justify-center text-sm font-semibold text-coffee-700 dark:text-coffee-200">
      {{ user.get_initials|default:"U" }}
    </a>
  </div>

</aside>
