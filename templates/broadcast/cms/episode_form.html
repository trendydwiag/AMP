{% extends "dashboard_base.html" %}
{% block title %}{% if form.instance.pk %}Edit Episode{% else %}Episode Baru{% endif %} - CMS{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="mb-8">
    <a href="{% url 'broadcast:cms_episode_list' %}" class="text-sm text-coffee-500 hover:text-coffee-700 dark:text-coffee-400 dark:hover:text-coffee-200 mb-1 inline-block">&larr; Kembali</a>
    <h1 class="text-2xl font-heading font-bold text-coffee-800 dark:text-coffee-100">{% if form.instance.pk %}Edit Episode{% else %}Episode Baru{% endif %}</h1>
  </div>
  <form method="post" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}
    <div class="bg-white dark:bg-coffee-800 rounded-xl shadow-sm border border-coffee-100 dark:border-coffee-700 p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">Program</label>
        <select name="program" required class="w-full px-4 py-2 rounded-lg border border-coffee-200 dark:border-coffee-600 bg-white dark:bg-coffee-700 text-coffee-800 dark:text-coffee-100 focus:ring-2 focus:ring-coffee-400">
          {% for p in form.fields.program.queryset %}<option value="{{ p.pk }}" {% if form.instance.program_id == p.pk %}selected{% endif %}>{{ p.title }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">Judul Episode</label>
        <input type="text" name="title" value="{{ form.instance.title|default:'' }}" required class="w-full px-4 py-2 rounded-lg border border-coffee-200 dark:border-coffee-600 bg-white dark:bg-coffee-700 text-coffee-800 dark:text-coffee-100 focus:ring-2 focus:ring-coffee-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">Deskripsi</label>
        <textarea name="description" rows="6" class="w-full px-4 py-2 rounded-lg border border-coffee-200 dark:border-coffee-600 bg-white dark:bg-coffee-700 text-coffee-800 dark:text-coffee-100 focus:ring-2 focus:ring-coffee-400">{{ form.instance.description|default:'' }}</textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">Nomor Episode</label><input type="number" name="episode_number" value="{{ form.instance.episode_number|default:'1' }}" class="w-full px-4 py-2 rounded-lg border border-coffee-200 dark:border-coffee-600 bg-white dark:bg-coffee-700 text-coffee-800 dark:text-coffee-100 focus:ring-2 focus:ring-coffee-400"></div>
        <div>
          <label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">Status</label>
          <select name="status" class="w-full px-4 py-2 rounded-lg border border-coffee-200 dark:border-coffee-600 bg-white dark:bg-coffee-700 text-coffee-800 dark:text-coffee-100 focus:ring-2 focus:ring-coffee-400">
            <option value="DRAFT" {% if form.instance.status == 'DRAFT' %}selected{% endif %}>Draft</option>
            <option value="PUBLISHED" {% if form.instance.status == 'PUBLISHED' %}selected{% endif %}>Published</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">Cover Image</label><input type="file" name="cover_image" accept="image/*" class="w-full text-sm text-coffee-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-coffee-100 file:text-coffee-700"></div>
        <div><label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">Audio</label><input type="file" name="recording_audio" accept="audio/*" class="w-full text-sm text-coffee-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-coffee-100 file:text-coffee-700"></div>
      </div>
      <div>
        <label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">Transkrip</label>
        <textarea name="transcript" rows="8" class="w-full px-4 py-2 rounded-lg border border-coffee-200 dark:border-coffee-600 bg-white dark:bg-coffee-700 text-coffee-800 dark:text-coffee-100 focus:ring-2 focus:ring-coffee-400">{{ form.instance.transcript|default:'' }}</textarea>
      </div>
    </div>
    <div class="bg-white dark:bg-coffee-800 rounded-xl shadow-sm border border-coffee-100 dark:border-coffee-700 p-6 space-y-4" x-data="{ open: false }">
      <button type="button" @click="open = !open" class="flex items-center justify-between w-full">
        <h3 class="font-heading font-semibold text-coffee-800 dark:text-coffee-100">SEO</h3>
        <svg class="w-5 h-5 text-coffee-400 transition-transform" :class="{ 'rotate-180': open }" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div x-show="open" x-transition class="space-y-4">
        <div><label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">SEO Title</label><input type="text" name="seo_title" value="{{ form.instance.seo_title|default:'' }}" maxlength="200" class="w-full px-4 py-2 rounded-lg border border-coffee-200 dark:border-coffee-600 bg-white dark:bg-coffee-700 text-coffee-800 dark:text-coffee-100 focus:ring-2 focus:ring-coffee-400"></div>
        <div><label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">OG Title</label><input type="text" name="og_title" value="{{ form.instance.og_title|default:'' }}" maxlength="200" class="w-full px-4 py-2 rounded-lg border border-coffee-200 dark:border-coffee-600 bg-white dark:bg-coffee-700 text-coffee-800 dark:text-coffee-100 focus:ring-2 focus:ring-coffee-400"></div>
        <div><label class="block text-sm font-medium text-coffee-600 dark:text-coffee-300 mb-1">OG Description</label><textarea name="og_description" rows="3" maxlength="500" class="w-full px-4 py-2 rounded-lg border border-coffee-200 dark:border-coffee-600 bg-white dark:bg-coffee-700 text-coffee-800 dark:text-coffee-100 focus:ring-2 focus:ring-coffee-400">{{ form.instance.og_description|default:'' }}</textarea></div>
      </div>
    </div>
    <div class="flex justify-end gap-3">
      <a href="{% url 'broadcast:cms_episode_list' %}" class="px-6 py-2 border border-coffee-200 dark:border-coffee-600 rounded-xl text-coffee-600 dark:text-coffee-300 hover:bg-coffee-50 dark:hover:bg-coffee-700">Batal</a>
      <button type="submit" class="px-6 py-2 bg-coffee-600 text-white rounded-xl hover:bg-coffee-700 transition-colors">Simpan</button>
    </div>
  </form>
</div>
{% endblock %}
