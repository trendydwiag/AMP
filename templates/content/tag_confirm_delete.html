{% extends "dashboard_base.html" %}

{% block title %}Hapus Tag - CMS{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto py-16">
  <div class="bg-white dark:bg-coffee-800 rounded-xl shadow-sm border border-coffee-100 dark:border-coffee-700 p-8 text-center">
    <svg class="w-16 h-16 mx-auto mb-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
    <h2 class="text-xl font-heading font-bold text-coffee-800 dark:text-coffee-100 mb-2">Hapus Tag?</h2>
    <p class="text-coffee-500 dark:text-coffee-400 mb-6">Tag "<strong>{{ object.name }}</strong>" akan dihapus permanen. Tindakan ini tidak dapat dibatalkan.</p>
    <div class="flex gap-3 justify-center">
      <a href="{% url 'content:tag_list' %}" class="px-6 py-2 border border-coffee-200 dark:border-coffee-600 rounded-xl text-coffee-600 dark:text-coffee-300 hover:bg-coffee-50 dark:hover:bg-coffee-700 text-sm">Batal</a>
      <form method="post">{% csrf_token %}
        <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 transition-colors text-sm">Hapus</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
