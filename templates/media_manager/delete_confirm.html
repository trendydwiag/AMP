{% extends "media_manager/base.html" %}
{% block media_content %}
<div class="max-w-md mx-auto text-center py-12">
  <svg class="mx-auto h-16 w-16 text-red-400 dark:text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
  </svg>
  <h2 class="mt-4 text-xl font-bold text-coffee-900 dark:text-coffee-100">Hapus File?</h2>
  <p class="mt-2 text-coffee-600 dark:text-coffee-300">Tindakan ini tidak dapat dibatalkan. File akan dihapus secara permanen.</p>
  <div class="mt-6 flex justify-center gap-3">
    <a href="{% url 'media_manager:list' %}" class="px-4 py-2 text-coffee-700 dark:text-coffee-300 hover:text-coffee-900 dark:hover:text-coffee-100">Batal</a>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 dark:bg-red-500 dark:hover:bg-red-400 font-medium">
        Ya, Hapus
      </button>
    </form>
  </div>
</div>
{% endblock %}
