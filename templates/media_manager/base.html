{% extends "amp_studio/base.html" %}
{% block title %}Manajemen Media{% endblock %}

{% block breadcrumb %}
<nav class="amp-breadcrumb" aria-label="Breadcrumb">
  <a href="{% url 'studio:dashboard' %}">
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
  </a>
  <span>›</span>
  <span>Media</span>
</nav>
{% endblock %}

{% block content %}
{% if messages %}
<div class="px-6 pt-4 space-y-2">
  {% for message in messages %}
  <div class="p-4 rounded-xl flex items-center gap-3 text-sm font-medium
    {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200{% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200{% else %}bg-coffee-50 text-coffee-700 border border-coffee-200{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
{% block media_content %}{% endblock %}
{% endblock %}
