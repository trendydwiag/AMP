{% extends "dashboard_base.html" %}
{% block title %}Manajemen Media{% endblock %}
{% block content %}
<div class="flex min-h-screen">
  <aside class="w-64 bg-coffee-50 dark:bg-coffee-800 border-r border-coffee-200 dark:border-coffee-600 p-4">
    <h2 class="text-lg font-semibold text-coffee-900 dark:text-coffee-100 mb-4">Media</h2>
    <nav class="space-y-1">
      <a href="{% url 'media_manager:dashboard' %}"
         class="block px-3 py-2 rounded-lg text-sm font-medium {% if request.resolver_match.url_name == 'dashboard' %}bg-coffee-50 dark:bg-coffee-700 text-coffee-700 dark:text-coffee-100{% else %}text-coffee-700 dark:text-coffee-300 hover:bg-coffee-100 dark:hover:bg-coffee-700{% endif %}">
        Dashboard
      </a>
      <a href="{% url 'media_manager:list' %}"
         class="block px-3 py-2 rounded-lg text-sm font-medium {% if request.resolver_match.url_name == 'list' %}bg-coffee-50 dark:bg-coffee-700 text-coffee-700 dark:text-coffee-100{% else %}text-coffee-700 dark:text-coffee-300 hover:bg-coffee-100 dark:hover:bg-coffee-700{% endif %}">
        Semua File
      </a>
      <a href="{% url 'media_manager:upload' %}"
         class="block px-3 py-2 rounded-lg text-sm font-medium {% if request.resolver_match.url_name == 'upload' %}bg-coffee-50 dark:bg-coffee-700 text-coffee-700 dark:text-coffee-100{% else %}text-coffee-700 dark:text-coffee-300 hover:bg-coffee-100 dark:hover:bg-coffee-700{% endif %}">
        Upload
      </a>
      <a href="{% url 'media_manager:folders' %}"
         class="block px-3 py-2 rounded-lg text-sm font-medium {% if request.resolver_match.url_name == 'folders' %}bg-coffee-50 dark:bg-coffee-700 text-coffee-700 dark:text-coffee-100{% else %}text-coffee-700 dark:text-coffee-300 hover:bg-coffee-100 dark:hover:bg-coffee-700{% endif %}">
        Folder
      </a>
      <a href="{% url 'media_manager:tags' %}"
         class="block px-3 py-2 rounded-lg text-sm font-medium {% if request.resolver_match.url_name == 'tags' %}bg-coffee-50 dark:bg-coffee-700 text-coffee-700 dark:text-coffee-100{% else %}text-coffee-700 dark:text-coffee-300 hover:bg-coffee-100 dark:hover:bg-coffee-700{% endif %}">
        Tag
      </a>
    </nav>
  </aside>
  <main class="flex-1 p-8">
    {% if messages %}
    {% for message in messages %}
    <div class="mb-4 p-4 rounded-lg {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200 dark:bg-green-900 dark:text-green-200 dark:border-green-700{% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200 dark:bg-red-900 dark:text-red-200 dark:border-red-700{% else %}bg-coffee-50 text-coffee-700 border border-coffee-200 dark:bg-coffee-900 dark:text-coffee-200 dark:border-coffee-600{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% block media_content %}{% endblock %}
  </main>
</div>
{% endblock %}
