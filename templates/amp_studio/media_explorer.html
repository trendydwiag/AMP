{% extends 'amp_studio/base.html' %}
{% load static %}

{% block title %}Media Explorer{% endblock %}

{% block content %}
<div x-data="mediaExplorer()">
  <div class="amp-page-header">
    <div>
      <h1 class="amp-page-title">Media Explorer</h1>
      <p class="amp-page-subtitle">Kelola semua file media dalam satu tempat.</p>
    </div>
    <div class="flex items-center gap-3">
      <button @click="viewMode = 'grid'" :class="{ 'bg-[var(--amp-coffee-50)] text-[var(--amp-coffee-600)]': viewMode === 'grid' }" class="amp-btn amp-btn-ghost amp-btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button @click="viewMode = 'list'" :class="{ 'bg-[var(--amp-coffee-50)] text-[var(--amp-coffee-600)]': viewMode === 'list' }" class="amp-btn amp-btn-ghost amp-btn-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="amp-btn amp-btn-primary gap-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload File
      </button>
    </div>
  </div>

  {# ── Filters ── #}
  <div class="flex items-center gap-4 mb-6">
    <div class="flex-1 max-w-md">
      <div class="relative">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amp-text-tertiary)" stroke-width="2" class="absolute left-3 top-1/2 -translate-y-1/2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input x-model="searchQuery" type="text" placeholder="Cari file..." class="amp-input pl-10 w-full">
      </div>
    </div>
    <select x-model="filterType" class="amp-input w-auto">
      <option value="">Semua Tipe</option>
      <option value="image">Gambar</option>
      <option value="audio">Audio</option>
      <option value="video">Video</option>
      <option value="document">Dokumen</option>
    </select>
  </div>

  {# ── Grid View ── #}
  <template x-if="viewMode === 'grid'">
    <div class="amp-grid amp-grid-auto">
      <template x-for="file in files" :key="file.id">
        <div class="amp-card amp-card-interactive p-0 overflow-hidden cursor-pointer group">
          <div class="aspect-square bg-[var(--amp-surface-tertiary)] flex items-center justify-center">
            <template x-if="file.type === 'image'">
              <img :src="file.url" :alt="file.name" class="w-full h-full object-cover">
            </template>
            <template x-if="file.type !== 'image'">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--amp-text-tertiary)" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </template>
          </div>
          <div class="p-3">
            <p class="text-sm font-medium text-[var(--amp-text-primary)] truncate" x-text="file.name"></p>
            <p class="text-xs text-[var(--amp-text-tertiary)] mt-0.5" x-text="file.size"></p>
          </div>
        </div>
      </template>
    </div>
  </template>

  {# ── List View ── #}
  <template x-if="viewMode === 'list'">
    <div class="amp-card overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-[var(--amp-border-light)]">
            <th class="text-left px-4 py-3 font-medium text-[var(--amp-text-secondary)]">Nama</th>
            <th class="text-left px-4 py-3 font-medium text-[var(--amp-text-secondary)]">Tipe</th>
            <th class="text-left px-4 py-3 font-medium text-[var(--amp-text-secondary)]">Ukuran</th>
            <th class="text-left px-4 py-3 font-medium text-[var(--amp-text-secondary)]">Diupload</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="file in files" :key="file.id">
            <tr class="border-b border-[var(--amp-border-light)] hover:bg-[var(--amp-surface-tertiary)] transition-colors">
              <td class="px-4 py-3 font-medium text-[var(--amp-text-primary)]" x-text="file.name"></td>
              <td class="px-4 py-3 text-[var(--amp-text-secondary)]" x-text="file.type"></td>
              <td class="px-4 py-3 text-[var(--amp-text-secondary)]" x-text="file.size"></td>
              <td class="px-4 py-3 text-[var(--amp-text-tertiary)]" x-text="file.uploaded"></td>
              <td class="px-4 py-3 text-right">
                <button class="amp-btn amp-btn-ghost amp-btn-icon text-xs">⋯</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>
</div>
{% endblock %}

{% block extra_js %}
<script>
function mediaExplorer() {
  return {
    viewMode: 'grid',
    searchQuery: '',
    filterType: '',
    files: [
      { id: 1, name: 'cover-podcast-ep12.jpg', type: 'image', size: '2.4 MB', uploaded: '2 jam lalu', url: '' },
      { id: 2, name: 'intro-theme.mp3', type: 'audio', size: '1.1 MB', uploaded: '1 hari lalu', url: '' },
      { id: 3, name: 'logo-kabulhaden.png', type: 'image', size: '340 KB', uploaded: '3 hari lalu', url: '' },
    ]
  };
}
</script>
{% endblock %}
