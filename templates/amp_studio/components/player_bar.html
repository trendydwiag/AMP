{# AMP Studio — Player Bar #}
<div class="amp-player-bar" x-data="ampPlayer()">
  {# ── Now Playing Info ── #}
  <div class="flex items-center gap-3 min-w-0 flex-1">
    <div class="w-10 h-10 rounded-lg bg-[var(--amp-coffee-100)] flex items-center justify-center flex-shrink-0">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--amp-coffee-600)" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </div>
    <div class="min-w-0">
      <p class="text-sm font-medium text-[var(--amp-text-primary)] truncate" x-text="currentSong || 'Tidak ada pemutaran'"></p>
      <p class="text-xs text-[var(--amp-text-tertiary)] truncate" x-text="currentProgram || 'Radio Kabulhaden'"></p>
    </div>
  </div>

  {# ── Playback Controls ── #}
  <div class="flex items-center gap-2">
    <button @click="reconnect()" class="amp-btn amp-btn-ghost amp-btn-icon" data-amp-tooltip="Sambung Ulang">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
    </button>
    <button @click="togglePlay()" class="amp-btn amp-btn-primary amp-btn-icon w-10 h-10 rounded-full">
      <svg x-show="!isPlaying" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <svg x-show="isPlaying" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
  </div>

  {# ── Volume ── #}
  <div class="hidden sm:flex items-center gap-2">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amp-text-tertiary)" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
    <input type="range" min="0" max="100" x-model="volume" @input="setVolume()" class="w-24 h-1 accent-[var(--amp-coffee-600)]">
    <span class="text-xs text-[var(--amp-text-tertiary)] w-8" x-text="volume + '%'"></span>
  </div>

  {# ── Stream Info ── #}
  <div class="hidden lg:flex items-center gap-3 text-xs text-[var(--amp-text-tertiary)]">
    <span x-show="bitrate" x-text="bitrate + ' kbps'"></span>
    <span x-show="listeners > 0" x-text="listeners + ' online'"></span>
  </div>
</div>
