{# AMP Studio — Notification Panel #}
<div x-show="notificationPanelOpen" x-transition class="fixed inset-0 z-[1090]" @keydown.escape.window="notificationPanelOpen = false">
  <div class="absolute inset-0" @click="notificationPanelOpen = false"></div>
  <div class="absolute top-16 right-6 w-96 max-w-[calc(100vw-3rem)]" @click.stop>
    <div class="bg-[var(--amp-surface-primary)] rounded-2xl shadow-[var(--amp-shadow-dropdown)] border border-[var(--amp-border-light)] overflow-hidden">
      
      {# Header #}
      <div class="px-5 py-4 border-b border-[var(--amp-border-light)] flex items-center justify-between">
        <h3 class="font-semibold text-[var(--amp-text-primary)]">Notifikasi</h3>
        <button class="text-xs text-[var(--amp-coffee-600)] hover:text-[var(--amp-coffee-700)] font-medium">Tandai semua dibaca</button>
      </div>

      {# Notification List #}
      <div class="max-h-96 overflow-y-auto">
        <div class="px-5 py-10 text-center">
          <div class="w-10 h-10 rounded-full bg-[var(--amp-surface-tertiary)] flex items-center justify-center mx-auto mb-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--amp-text-tertiary)" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          </div>
          <p class="text-sm text-[var(--amp-text-tertiary)]">Belum ada notifikasi baru.</p>
        </div>
      </div>

      {# Footer #}
      <div class="px-5 py-3 border-t border-[var(--amp-border-light)] text-center">
        <button class="text-sm font-medium text-[var(--amp-coffee-600)] hover:text-[var(--amp-coffee-700)]">Lihat Semua Notifikasi</button>
      </div>
    </div>
  </div>
</div>
