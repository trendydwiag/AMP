{% extends 'base.html' %}

{% block layout %}
<div class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-slate-100 dark:bg-slate-900 transition-colors duration-200">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <a href="{% url 'core:home' %}" class="inline-block text-3xl font-extrabold text-brand-500 dark:text-blue-400">
            Kabulhaden CMS
        </a>
        <h2 class="mt-6 text-center text-2xl font-bold tracking-tight text-slate-900 dark:text-white">
            {% block auth_title %}{% endblock %}
        </h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white dark:bg-slate-800 py-8 px-4 shadow sm:rounded-xl sm:px-10 border border-slate-200 dark:border-slate-700 transition-colors duration-200">
            {% block auth_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
