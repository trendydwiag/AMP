{% extends "settings/base.html" %}
{% block settings_content %}
<div class="max-w-3xl">
  <h1 class="text-2xl font-bold text-coffee-900 dark:text-coffee-100 mb-6">{{ title }}</h1>
  <form method="post" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}
    <div class="bg-white dark:bg-coffee-800 shadow rounded-lg p-6 space-y-4">
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-coffee-700 dark:text-coffee-200 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>
        {% endif %}
        {% if field.help_text %}
        <p class="mt-1 text-sm text-coffee-500 dark:text-coffee-400">{{ field.help_text }}</p>
        {% endif %}
      </div>
      {% endfor %}
    </div>
    <div class="flex justify-end">
      <button type="submit" class="px-6 py-2 bg-coffee-500 dark:bg-coffee-400 text-white rounded-lg hover:bg-coffee-600 dark:hover:bg-coffee-300 font-medium">
        Simpan Perubahan
      </button>
    </div>
  </form>
</div>
{% endblock %}
