<div x-data="{ volume: {{ volume|default:"80" }}, muted: false, prevVolume: 80 }" class="flex items-center gap-2">
    <button @click="
        if (muted) { volume = prevVolume; muted = false; }
        else { prevVolume = volume; volume = 0; muted = true; }
        $dispatch('volume-change', { volume: volume });
    " class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
        <svg x-show="volume > 0" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
        </svg>
        <svg x-show="volume == 0" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
        </svg>
    </button>

    <input type="range" min="0" max="100" x-model="volume" @input="$dispatch('volume-change', { volume: parseInt(volume) })" class="w-24 h-1 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer">

    <span class="text-xs text-slate-400 w-8 text-right" x-text="volume + '%'"></span>
</div>
