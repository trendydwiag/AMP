<div x-data="{ active: false }" x-effect="active = isPlaying" class="flex items-end gap-0.5 h-4">
    <span class="w-0.5 bg-coffee-500 dark:bg-coffee-400 rounded-full transition-all" :class="active ? 'animate-wave-1' : 'h-1'"></span>
    <span class="w-0.5 bg-coffee-500 dark:bg-coffee-400 rounded-full transition-all" :class="active ? 'animate-wave-2' : 'h-1'"></span>
    <span class="w-0.5 bg-coffee-500 dark:bg-coffee-400 rounded-full transition-all" :class="active ? 'animate-wave-3' : 'h-1'"></span>
    <span class="w-0.5 bg-coffee-500 dark:bg-coffee-400 rounded-full transition-all" :class="active ? 'animate-wave-4' : 'h-1'"></span>
    <span class="w-0.5 bg-coffee-500 dark:bg-coffee-400 rounded-full transition-all" :class="active ? 'animate-wave-5' : 'h-1'"></span>
</div>

<style>
@keyframes wave1 { 0%, 100% { height: 4px; } 50% { height: 16px; } }
@keyframes wave2 { 0%, 100% { height: 8px; } 50% { height: 12px; } }
@keyframes wave3 { 0%, 100% { height: 6px; } 50% { height: 14px; } }
@keyframes wave4 { 0%, 100% { height: 10px; } 50% { height: 6px; } }
@keyframes wave5 { 0%, 100% { height: 4px; } 50% { height: 10px; } }

.animate-wave-1 { animation: wave1 1.2s ease-in-out infinite; }
.animate-wave-2 { animation: wave2 1.0s ease-in-out infinite 0.1s; }
.animate-wave-3 { animation: wave3 1.4s ease-in-out infinite 0.2s; }
.animate-wave-4 { animation: wave4 1.1s ease-in-out infinite 0.15s; }
.animate-wave-5 { animation: wave5 1.3s ease-in-out infinite 0.25s; }
</style>
