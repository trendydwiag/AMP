<div x-data="listenerCounter()" x-init="init()" class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-full bg-coffee-100 dark:bg-coffee-900 flex items-center justify-center">
        <svg class="w-4 h-4 text-coffee-500 dark:text-coffee-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </div>
    <div>
        <p class="text-lg font-bold text-slate-900 dark:text-white leading-tight" x-text="currentListeners">0</p>
        <p class="text-xs text-slate-500 dark:text-slate-400 leading-tight">pendengar</p>
    </div>
</div>

<script>
function listenerCounter() {
    return {
        currentListeners: 0,
        refreshInterval: null,

        init() {
            this.fetchCount();
            this.refreshInterval = setInterval(() => this.fetchCount(), 15000);
        },

        async fetchCount() {
            try {
                const response = await fetch('/radio/api/listener/');
                const data = await response.json();
                this.currentListeners = data.current_listeners || 0;
            } catch (e) {
                console.error('Listener counter error:', e);
            }
        }
    }
}
</script>
