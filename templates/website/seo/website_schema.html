<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ SITE_NAME }}",
    "url": "{{ SITE_URL|default:'https://kabulhaden.id' }}",
    "potentialAction": {
        "@type": "SearchAction",
        "target": {
            "@type": "EntryPoint",
            "urlTemplate": "{{ SITE_URL|default:'https://kabulhaden.id' }}/pencarian/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
    }
}
</script>
