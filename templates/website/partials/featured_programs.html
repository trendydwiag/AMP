<div id="featured-programs">
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm">
        <div class="p-5">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-bold text-slate-900 dark:text-white flex items-center gap-2">
                    <svg class="w-4 h-4 text-coffee-500 dark:text-coffee-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                    </svg>
                    Program Unggulan
                </h3>
                <a href="{% url 'website:program_list' %}" class="text-xs font-medium text-coffee-500 dark:text-coffee-400 hover:underline">Semua Program</a>
            </div>

            {% if programs %}
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {% for program in programs %}
                <article class="group bg-slate-50 dark:bg-slate-700/50 rounded-lg overflow-hidden hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                    <a href="{% url 'website:program_detail' program.slug %}" class="block p-4">
                        <div class="flex items-start gap-3">
                            <div class="flex-shrink-0 w-12 h-12 rounded-lg overflow-hidden bg-slate-100 dark:bg-slate-600">
                                {% if program.thumbnail %}
                                <img src="{{ program.thumbnail.url }}" alt="{{ program.title }}" class="w-full h-full object-cover" loading="lazy">
                                {% else %}
                                <div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-coffee-100 to-coffee-50 dark:from-coffee-500/20 dark:to-coffee-600/10">
                                    <svg class="w-6 h-6 text-coffee-500/40 dark:text-coffee-400/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z" />
                                    </svg>
                                </div>
                                {% endif %}
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="text-sm font-semibold text-slate-900 dark:text-white group-hover:text-coffee-500 dark:group-hover:text-coffee-400 transition-colors line-clamp-1 mb-0.5">{{ program.title }}</h4>
                                {% if program.category %}
                                <span class="inline-block text-[10px] text-slate-500 dark:text-slate-400">{{ program.category }}</span>
                                {% endif %}
                            </div>
                        </div>
                    </a>
                </article>
                {% endfor %}
            </div>
            {% else %}
            <div class="text-center py-8">
                <svg class="w-10 h-10 text-slate-300 dark:text-slate-600 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z" />
                </svg>
                <p class="text-sm text-slate-500 dark:text-slate-400">Belum ada program unggulan.</p>
            </div>
            {% endif %}
        </div>
    </div>
</div>
