<div class="group bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm hover:shadow-md dark:hover:shadow-lg dark:hover:shadow-slate-900/50 transition-all duration-300 text-center">
    {% if partner.website %}
    <a href="{{ partner.website }}" target="_blank" rel="noopener noreferrer" class="block" aria-label="Kunjungi situs {{ partner.name }}">
    {% else %}
    <div class="block">
    {% endif %}
        <div class="flex items-center justify-center h-16 mb-4">
            {% if partner.logo %}
            <img src="{{ partner.logo.url }}" alt="{{ partner.name }}" class="max-h-14 max-w-[160px] object-contain grayscale group-hover:grayscale-0 transition-all duration-300" loading="lazy">
            {% else %}
            <div class="h-14 px-8 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center">
                <span class="text-lg font-bold text-slate-400 dark:text-slate-500">{{ partner.name }}</span>
            </div>
            {% endif %}
        </div>
        <h3 class="text-sm font-semibold text-slate-900 dark:text-white mb-1">{{ partner.name }}</h3>
        {% if partner.description %}
        <p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-2">{{ partner.description|truncatewords:12 }}</p>
        {% endif %}
    {% if partner.website %}
    </a>
    {% else %}
    </div>
    {% endif %}
</div>
