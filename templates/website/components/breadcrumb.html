<nav class="flex items-center text-sm text-slate-500 dark:text-slate-400 mb-6" aria-label="Breadcrumb">
    <ol class="flex items-center flex-wrap gap-1">
        <li>
            <a href="{% url 'website:home' %}" class="flex items-center gap-1 hover:text-coffee-500 dark:hover:text-coffee-400 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Beranda
            </a>
        </li>
        {% for crumb in breadcrumbs %}
        <li class="flex items-center gap-1">
            <svg class="w-4 h-4 text-slate-300 dark:text-slate-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
            {% if crumb.url %}
            <a href="{{ crumb.url }}" class="hover:text-coffee-500 dark:hover:text-coffee-400 transition-colors">{{ crumb.label }}</a>
            {% else %}
            <span class="text-slate-700 dark:text-slate-300 font-medium">{{ crumb.label }}</span>
            {% endif %}
        </li>
        {% endfor %}
    </ol>
</nav>
