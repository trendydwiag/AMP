<div x-data="{ email: '', submitting: false, success: false, error: '' }" class="w-full">
    <form @submit.prevent="
        submitting = true;
        error = '';
        fetch('{% url 'website:newsletter_subscribe' %}', {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        })
        .then(r => r.json())
        .then(data => {
            submitting = false;
            if (data.success) { success = true; email = ''; } else { error = data.message || 'Terjadi kesalahan.'; }
        })
        .catch(() => { submitting = false; error = 'Gagal mengirim. Coba lagi.'; })
    " class="space-y-2.5">
        <div x-show="!success">
            <div class="flex gap-2">
                <input type="email" x-model="email" placeholder="Alamat email Anda" required class="flex-1 min-w-0 px-3.5 py-2.5 rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-sm text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-coffee-500 dark:focus:ring-coffee-500 focus:border-transparent transition-colors">
                <button type="submit" :disabled="submitting" class="px-4 py-2.5 rounded-lg bg-coffee-500 dark:bg-coffee-500 text-white text-sm font-medium hover:bg-coffee-600 dark:hover:bg-coffee-600 focus:outline-none focus:ring-2 focus:ring-coffee-500 dark:focus:ring-coffee-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex-shrink-0">
                    <span x-show="!submitting">Kirim</span>
                    <span x-show="submitting" style="display: none;">
                        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                    </span>
                </button>
            </div>
            <p x-show="error" x-text="error" class="text-xs text-red-500 dark:text-red-400 mt-1.5" style="display: none;"></p>
        </div>
        <div x-show="success" x-transition class="flex items-center gap-2 py-2.5" style="display: none;">
            <svg class="w-5 h-5 text-green-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-sm text-green-600 dark:text-green-400 font-medium">Terima kasih! Anda telah berlangganan.</span>
        </div>
    </form>
</div>
