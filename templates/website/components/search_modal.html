{% load static %}
<div id="search-modal" class="hidden fixed inset-0 z-[90] search-backdrop bg-black/50" role="dialog" aria-modal="true" aria-label="Cari">
    <div class="flex items-start justify-center min-h-screen pt-[15vh] px-4" @click.self="toggleSearch()">
        <div class="w-full max-w-2xl bg-white rounded-2xl shadow-2xl border border-coffee-200 overflow-hidden animate-scale-in" @click.stop>
            <div class="flex items-center gap-3 px-6 py-4 border-b border-coffee-200">
                <svg class="w-5 h-5 text-coffee-300 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input
                    type="search"
                    placeholder="Cari program, podcast, berita..."
                    class="flex-1 bg-transparent text-lg text-coffee-700 placeholder-coffee-300 focus:outline-none font-body"
                    oninput="handleSearch(this.value)"
                    autofocus
                >
                <div class="flex items-center gap-2">
                    <kbd class="hidden sm:inline-flex items-center px-2 py-0.5 rounded text-xs font-mono text-coffee-300 bg-coffee-50 border border-coffee-200">ESC</kbd>
                    <kbd class="hidden sm:inline-flex items-center px-2 py-0.5 rounded text-xs font-mono text-coffee-300 bg-coffee-50 border border-coffee-200">/</kbd>
                </div>
            </div>
            <div id="search-results" class="max-h-[50vh] overflow-y-auto p-4">
                <div class="text-center py-8">
                    <svg class="w-12 h-12 mx-auto mb-3 text-coffee-200" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    <p class="text-coffee-300 text-sm font-body">Ketik untuk mulai mencari...</p>
                    <p class="text-coffee-200 text-xs mt-1 font-body">Program, podcast, berita, dan lainnya</p>
                </div>
            </div>
        </div>
    </div>
</div>
